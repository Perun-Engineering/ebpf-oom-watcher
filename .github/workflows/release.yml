name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      should-release: ${{ steps.set-outputs.outputs.should-release }}
      new-version: ${{ steps.set-outputs.outputs.new-version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install semantic-release
        run: |
          npm install -g semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github

      - name: Run semantic-release
        id: semantic-release
        run: |
          npx semantic-release --debug
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set outputs
        id: set-outputs
        run: |
          if git tag --points-at HEAD | grep -q "v"; then
            echo "should-release=true" >> $GITHUB_OUTPUT
            echo "new-version=$(git tag --points-at HEAD | head -1 | sed 's/^v//')" >> $GITHUB_OUTPUT
          else
            echo "should-release=false" >> $GITHUB_OUTPUT
            echo "new-version=" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    needs: detect-changes
    if: needs.detect-changes.outputs.should-release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7

      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-and-push:
    name: Merge and Push Manifest
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.should-release == 'true'
    outputs:
      image-digest: ${{ steps.merge.outputs.digest }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v6
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.detect-changes.outputs.new-version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.detect-changes.outputs.new-version }}
            type=semver,pattern={{major}},value=${{ needs.detect-changes.outputs.new-version }}
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          IMAGE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          TAG_ARGS=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS+=(-t "$tag")
          done <<< "${{ steps.meta.outputs.tags }}"
          SRC_ARGS=()
          for digest in *; do
            SRC_ARGS+=("$IMAGE@sha256:$digest")
          done
          docker buildx imagetools create "${TAG_ARGS[@]}" "${SRC_ARGS[@]}"

      - name: Inspect image
        id: merge
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker buildx imagetools inspect "$IMAGE:latest"
          echo "digest=$(docker buildx imagetools inspect "$IMAGE:latest" --format '{{json .Manifest}}' | jq -r .digest)" >> "$GITHUB_OUTPUT"

  helm-package:
    name: Package and Push Helm Chart
    runs-on: ubuntu-latest
    needs: [detect-changes, merge-and-push]
    if: needs.detect-changes.outputs.should-release == 'true'
    steps:
      - uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.1
        with:
          version: 3.13.0

      - name: Log in to GitHub Container Registry
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Update Helm chart version and appVersion
        run: |
          VERSION=${{ needs.detect-changes.outputs.new-version }}
          sed -i "s/^version:.*/version: ${VERSION}/" helm/oom-watcher/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" helm/oom-watcher/Chart.yaml
          sed -i "s|repository:.*|repository: ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')|" helm/oom-watcher/values.yaml
          sed -i "s/tag:.*/tag: \"${VERSION}\"/" helm/oom-watcher/values.yaml

      - name: Package Helm chart
        run: |
          helm package helm/oom-watcher --destination .

      - name: Push Helm chart
        run: |
          VERSION=${{ needs.detect-changes.outputs.new-version }}
          helm push oom-watcher-${VERSION}.tgz oci://ghcr.io/$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')/charts

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [detect-changes, merge-and-push, helm-package]
    if: needs.detect-changes.outputs.should-release == 'true'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install semantic-release
        run: |
          npm install -g semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github

      - name: Create .releaserc.json
        run: |
          cat > .releaserc.json << 'EOF'
          {
            "branches": ["main"],
            "plugins": [
              "@semantic-release/commit-analyzer",
              "@semantic-release/release-notes-generator",
              [
                "@semantic-release/changelog",
                {
                  "changelogFile": "CHANGELOG.md"
                }
              ],
              [
                "@semantic-release/github",
                {
                  "assets": [],
                  "draftRelease": true
                }
              ]
            ]
          }
          EOF

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
